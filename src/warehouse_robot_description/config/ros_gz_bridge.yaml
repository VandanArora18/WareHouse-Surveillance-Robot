# ros_gz_bridge.yaml
# Bridges all topics between Ignition Fortress and ROS 2
# Place at: config/ros_gz_bridge.yaml

---
# ── Clock (CRITICAL — all nodes use sim time) ──────────────────
- ros_topic_name: /clock
  gz_topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: ignition.msgs.Clock
  direction: GZ_TO_ROS

# ── Drive command (ROS→GZ) ─────────────────────────────────────
- ros_topic_name: /cmd_vel
  gz_topic_name: /cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: ignition.msgs.Twist
  direction: ROS_TO_GZ

# ── Odometry (GZ→ROS, used by SLAM for pose estimate) ─────────
- ros_topic_name: /odom
  gz_topic_name: /odom
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: ignition.msgs.Odometry
  direction: GZ_TO_ROS

# ── TF (GZ→ROS, publishes odom→base_footprint from diff drive) ─
- ros_topic_name: /tf
  gz_topic_name: /tf
  ros_type_name: tf2_msgs/msg/TFMessage
  gz_type_name: ignition.msgs.Pose_V
  direction: GZ_TO_ROS

# ── Joint states (GZ→ROS, arm + caster joints) ─────────────────
- ros_topic_name: /joint_states
  gz_topic_name: /world/warehouse_factory/model/warehouse_robot/joint_state
  ros_type_name: sensor_msgs/msg/JointState
  gz_type_name: ignition.msgs.Model
  direction: GZ_TO_ROS

# ── LiDAR scan (GZ→ROS, fed to slam_toolbox) ──────────────────
- ros_topic_name: /scan
  gz_topic_name: /scan
  ros_type_name: sensor_msgs/msg/LaserScan
  gz_type_name: ignition.msgs.LaserScan
  direction: GZ_TO_ROS

# ── IMU (GZ→ROS) ───────────────────────────────────────────────
- ros_topic_name: /imu
  gz_topic_name: /imu
  ros_type_name: sensor_msgs/msg/Imu
  gz_type_name: ignition.msgs.IMU
  direction: GZ_TO_ROS

# ── Camera image (GZ→ROS) ──────────────────────────────────────
- ros_topic_name: /camera/image_raw
  gz_topic_name: /camera/image_raw
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: ignition.msgs.Image
  direction: GZ_TO_ROS

# ── Camera info ────────────────────────────────────────────────
- ros_topic_name: /camera/camera_info
  gz_topic_name: /camera/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: ignition.msgs.CameraInfo
  direction: GZ_TO_ROS